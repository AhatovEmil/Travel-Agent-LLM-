services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitf
      POSTGRES_PASSWORD: aitf_password
      POSTGRES_DB: aitf
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitf"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://aitf:aitf_password@db:5432/aitf
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: "*"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:

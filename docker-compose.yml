services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: travel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: travel
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travel"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DATABASE_URL: postgresql+psycopg2://travel:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/travel
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env (openssl rand -hex 32)}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com/v1}
      LLM_MODEL: ${LLM_MODEL:-deepseek-chat}
      LLM_MODEL_FALLBACKS: ${LLM_MODEL_FALLBACKS:-deepseek-reasoner}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,https://localhost}
      LLM_RATE_LIMIT_PER_HOUR: ${LLM_RATE_LIMIT_PER_HOUR:-20}
      REGISTRATION_ENABLED: ${REGISTRATION_ENABLED:-true}
      FREE_GENERATIONS_PER_MONTH: ${FREE_GENERATIONS_PER_MONTH:-5}
      SUPPORT_TELEGRAM: ${SUPPORT_TELEGRAM:-https://t.me/}
      ADMIN_CREDIT_TOKEN: ${ADMIN_CREDIT_TOKEN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TRIBUTE_API_KEY: ${TRIBUTE_API_KEY:-}
      TRIBUTE_PRODUCT_10: ${TRIBUTE_PRODUCT_10:-}
      TRIBUTE_PRODUCT_30: ${TRIBUTE_PRODUCT_30:-}
      TRIBUTE_PRODUCT_100: ${TRIBUTE_PRODUCT_100:-}
      TRIBUTE_LINK_10: ${TRIBUTE_LINK_10:-}
      TRIBUTE_LINK_30: ${TRIBUTE_LINK_30:-}
      TRIBUTE_LINK_100: ${TRIBUTE_LINK_100:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    # Порты наружу не открываем — только через Caddy

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
